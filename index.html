<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy by Thai Thai</title>
    <style>
        /* Base styles for TikTok-style vertical feed */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Hero / Feed Item */
        .feed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-card {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
            scroll-snap-align: start;
        }

        /* Order button (DoorDash style) */
        .order-btn {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .item-info {
            margin-bottom: 20px;
        }

        h2 { margin: 0; font-size: 1.5rem; }
        p { margin: 5px 0; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="feed-container">
        <!-- Example Menu Item Card -->
        <div class="item-card" style="background-image: url('your-image-url.jpg'); background-size: cover; background-position: center;">
            <div class="item-info">
                <h2>Pad Thai Classic</h2>
                <p>$14.99 - Signature Tamarind Sauce</p>
                <button class="order-btn">Add to Order</button>
            </div>
        </div>

        <!-- Another Item -->
        <div class="item-card" style="background-image: url('your-other-image.jpg'); background-size: cover; background-position: center;">
            <div class="item-info">
                <h2>Green Curry</h2>
                <p>$16.50 - Spicy & Creamy</p>
                <button class="order-btn">Add to Order</button>
            </div>
        </div>
    </div>

</body>
</html>
