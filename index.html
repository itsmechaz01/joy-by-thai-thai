<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy by Thai Thai</title>
    <style>
        :root { --primary: #ff0000; --bg: #000; --text: #fff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid var(--primary); }
        h1 { color: var(--primary); margin: 0; }
        .category-title { color: var(--primary); font-weight: bold; margin-top: 25px; border-bottom: 1px solid #333; padding: 10px 0; text-transform: uppercase; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .price { color: #aaa; font-weight: bold; }
        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #fff; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .helcim-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <header><h1>Joy by Thai Thai</h1></header>

    <div id="home" class="page active">
        <h2>Trending Now</h2>
        <div style="height: 300px; background: #222; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
            TikTok Feed Placeholder
        </div>
    </div>

    <div id="menu" class="page">
        <div id="menu-content"></div>
    </div>

    <div id="liked" class="page"><h2>Your Favorites</h2></div>

    <div id="cart" class="page">
        <h2>Your Cart</h2>
        <p>Total: $0.00</p>
        <a href="https://your-helcim-payment-link.com" style="text-decoration: none;">
            <button class="helcim-btn">Pay with Helcim</button>
        </a>
    </div>

    <nav>
        <button class="nav-btn" onclick="showPage('home')">🏠 Home</button>
        <button class="nav-btn" onclick="showPage('menu')">🍽️ Menu</button>
        <button class="nav-btn" onclick="showPage('liked')">❤️ Liked</button>
        <button class="nav-btn" onclick="showPage('cart')">🛒 Cart</button>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        const menuData = {
            "Curry in a Hurry": [{name: "Chicken Green Curry (Hot)", price: 13.45}, {name: "Green Curry", price: 13.45}, {name: "Massaman Curry", price: 13.45}, {name: "Mussaman", price: 14.0}, {name: "Pad Thai vegan", price: 11.95}],
            "Joyful Bites": [{name: "Chicken Wings", price: 9.0}, {name: "Crab Rangoon (6pcs)", price: 7.45}, {name: "Crispy Spring Rolls", price: 7.0}, {name: "Pot Stickers", price: 8.5}],
            "WOK This Way Tacos": [{name: "(1) Chicken Taco", price: 3.0}, {name: "(2) Shrimp Tacos", price: 12.0}, {name: "(4) Shrimp Tacos", price: 22.0}]
        };

        const container = document.getElementById('menu-content');
        for (const [category, items] of Object.entries(menuData)) {
            container.innerHTML += `<div class="category-title">${category}</div>`;
            items.forEach(item => {
                container.innerHTML += `<div class="item"><span>${item.name}</span><span class="price">$${item.price.toFixed(2)}</span></div>`;
            });
        }
    </script>
</body>
</html>
