cat <<'EOF' > index.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy by Thai Thai</title>
    <style>
        :root { --primary: #ff0000; --bg: #000; --text: #fff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        /* Header & Search */
        header { padding: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 15px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #222; color: #fff; box-sizing: border-box; }

        /* Feed Cards */
        .page { display: none; }
        .active { display: block; }
        .card { position: relative; height: 300px; border-radius: 20px; margin: 20px; overflow: hidden; background: #333; display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box; background-size: cover; background-position: center; }
        .card-overlay { z-index: 1; }
        .badge { background: #ffcc00; color: #000; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; position: absolute; top: 15px; left: 15px; }
        .title { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .price { color: var(--primary); font-size: 1.5rem; font-weight: bold; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #aaa; font-size: 0.7rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <h1>Joy by Thai Thai</h1>
        <input type="text" class="search-bar" placeholder="Search Thai dishes...">
    </header>

    <!-- Home (Visual Feed) -->
    <div id="home" class="page active">
        <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('https://via.placeholder.com/600x400');">
            <span class="badge">Popular 🔥</span>
            <div class="card-overlay">
                <div class="title">Thai Fried Rice</div>
                <div style="font-size: 0.9rem; opacity: 0.8;">4.8 ★ • 12 min</div>
                <div class="price">$12.45</div>
            </div>
        </div>
        <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('https://via.placeholder.com/600x400');">
            <span class="badge">Popular 🔥</span>
            <div class="card-overlay">
                <div class="title">Green Curry</div>
                <div style="font-size: 0.9rem; opacity: 0.8;">4.7 ★ • 15 min</div>
                <div class="price">$13.45</div>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <nav>
        <button class="nav-btn active" onclick="showPage('home')">🏠 Home</button>
        <button class="nav-btn" onclick="showPage('menu')">🍽️ Menu</button>
        <button class="nav-btn" onclick="showPage('saved')">❤️ Saved</button>
        <button class="nav-btn" onclick="showPage('cart')">🛒 Cart</button>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
